<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deepderm · Skin Analysis AI</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Playfair+Display:wght@400;500&display=swap"
    rel="stylesheet" />
  <!-- aidAR Unified Theme -->
  <link rel="stylesheet" href="/medhelp-theme.css">
  <style>
    :root {
      --bg: #0a0e1a;
      --bg2: #111827;
      --bg3: #1a2235;
      --border: rgba(99, 179, 237, 0.12);
      --border2: rgba(99, 179, 237, 0.22);
      --accent: #63b3ed;
      --accent2: #4299e1;
      --danger: #fc8181;
      --warn: #f6ad55;
      --success: #68d391;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --serif: 'Playfair Display', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 14, 26, 0.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent2), #667eea);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .logo-text {
      font-family: var(--serif);
      font-size: 20px;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-sub {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
    }

    .nav-badge {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--accent);
      background: rgba(99, 179, 237, 0.08);
      border: 1px solid var(--border2);
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* LAYOUT */
    .app {
      display: grid;
      grid-template-columns: 400px 1fr;
      min-height: calc(100vh - 61px);
    }

    /* LEFT PANEL */
    .left-panel {
      padding: 2rem 1.5rem;
      border-right: 1px solid var(--border);
      background: var(--bg2);
      overflow-y: auto;
      height: calc(100vh - 61px);
    }

    .panel-title {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    /* UPLOAD */
    .upload-zone {
      border: 1.5px dashed var(--border2);
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1.5rem;
      position: relative;
      background: rgba(99, 179, 237, 0.02);
    }

    .upload-zone:hover {
      border-color: var(--accent);
      background: rgba(99, 179, 237, 0.05);
    }

    .upload-zone.has-image {
      border-style: solid;
      border-color: var(--accent2);
    }

    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(99, 179, 237, 0.08);
    }

    #fileInput {
      display: none;
    }

    .upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .upload-text {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .upload-sub {
      font-size: 12px;
      color: var(--text3);
    }

    #preview {
      width: 100%;
      border-radius: 8px;
      margin-top: 12px;
      max-height: 200px;
      object-fit: contain;
      display: none;
    }

    /* FORM */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 11px;
      color: var(--text3);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input,
    select,
    textarea {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent2);
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    select option {
      background: var(--bg2);
    }

    /* BTN */
    .analyze-btn {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent2), #667eea);
      color: white;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .analyze-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .analyze-btn:active:not(:disabled) {
      transform: scale(0.98);
    }

    .analyze-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* RIGHT PANEL */
    .right-panel {
      padding: 2rem;
      overflow-y: auto;
      height: calc(100vh - 61px);
    }

    /* EMPTY STATE */
    .empty-state {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text3);
    }

    .empty-icon {
      font-size: 56px;
      margin-bottom: 1rem;
      opacity: 0.4;
    }

    .empty-title {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .empty-text {
      font-size: 14px;
      max-width: 360px;
      line-height: 1.7;
    }

    /* LOADING */
    .loading-state {
      text-align: center;
      padding: 4rem 0;
    }

    .skin-anim {
      font-size: 48px;
      margin-bottom: 1.5rem;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-10px)
      }
    }

    .loading-title {
      font-family: var(--serif);
      font-size: 20px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .loading-sub {
      font-size: 13px;
      color: var(--text3);
      font-family: var(--mono);
    }

    .progress-bar {
      width: 280px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin: 1.5rem auto 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      animation: progress 3s ease-in-out infinite;
    }

    @keyframes progress {
      0% {
        width: 0%
      }

      70% {
        width: 85%
      }

      100% {
        width: 85%
      }
    }

    /* REPORT */
    .report {
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .report-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 1.5rem;
      background: var(--bg2);
      border-radius: 12px;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .report-id {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 4px;
    }

    .report-title-text {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--text);
      margin-bottom: 6px;
    }

    .report-meta {
      font-size: 12px;
      color: var(--text3);
    }

    .risk-badge {
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      font-family: var(--mono);
      white-space: nowrap;
    }

    .risk-low {
      background: rgba(104, 211, 145, 0.12);
      color: var(--success);
      border: 1px solid rgba(104, 211, 145, 0.25);
    }

    .risk-moderate {
      background: rgba(246, 173, 85, 0.12);
      color: var(--warn);
      border: 1px solid rgba(246, 173, 85, 0.25);
    }

    .risk-high {
      background: rgba(252, 129, 129, 0.12);
      color: var(--danger);
      border: 1px solid rgba(252, 129, 129, 0.25);
    }

    .section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .section-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .section-heading {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .section-body {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.75;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-size: 12px;
      font-family: var(--mono);
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(99, 179, 237, 0.08);
      color: var(--accent);
      border: 1px solid var(--border2);
    }

    .step-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .step-num {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(99, 179, 237, 0.1);
      color: var(--accent);
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.6;
    }

    .disclaimer {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      background: rgba(246, 173, 85, 0.05);
      border: 1px solid rgba(246, 173, 85, 0.15);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text3);
      line-height: 1.6;
    }

    .disclaimer strong {
      color: var(--warn);
    }

    .error-box {
      padding: 1.5rem;
      background: rgba(252, 129, 129, 0.05);
      border: 1px solid rgba(252, 129, 129, 0.2);
      border-radius: 12px;
      color: var(--danger);
      font-size: 14px;
    }
  </style>
</head>

<body>

  <nav>
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div>
        <div class="logo-text">Deepderm</div>
        <div class="logo-sub">Skin Analysis · Dermatology AI</div>
      </div>
    </div>
    <div class="nav-badge">v1.0 · Hackathon Build</div>
  </nav>

  <div class="app">
    <!-- LEFT PANEL: INPUT -->
    <div class="left-panel">
      <div class="panel-title">01 · Upload Skin Image</div>

      <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])">
        <div class="upload-icon">📸</div>
        <div class="upload-text">Drop skin image here</div>
        <div class="upload-sub">PNG, JPG, JPEG · click to browse</div>
        <img id="preview" alt="Skin preview">
      </div>

      <div class="panel-title">02 · Patient Details</div>

      <div class="form-grid">
        <div class="field">
          <label>Age</label>
          <input type="number" id="age" placeholder="e.g. 34" min="1" max="120">
        </div>
        <div class="field">
          <label>Sex</label>
          <select id="sex">
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label>Skin Type (Fitzpatrick)</label>
          <select id="skinType">
            <option value="">Select</option>
            <option>Type I — Very Fair</option>
            <option>Type II — Fair</option>
            <option>Type III — Medium</option>
            <option>Type IV — Olive</option>
            <option>Type V — Brown</option>
            <option>Type VI — Dark</option>
          </select>
        </div>
        <div class="field">
          <label>Affected Area</label>
          <select id="area">
            <option value="">Select</option>
            <option>Face</option>
            <option>Scalp</option>
            <option>Neck</option>
            <option>Chest / Back</option>
            <option>Arms</option>
            <option>Hands</option>
            <option>Legs</option>
            <option>Feet</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label>Duration</label>
          <select id="duration">
            <option value="">Not specified</option>
            <option>
              < 1 week</option>
            <option>1–4 weeks</option>
            <option>1–3 months</option>
            <option>3–6 months</option>
            <option>> 6 months</option>
          </select>
        </div>
        <div class="field">
          <label>Known Allergies</label>
          <input type="text" id="allergies" placeholder="e.g. None">
        </div>

        <div class="field full">
          <label>Symptoms / Clinical Notes</label>
          <textarea id="symptoms"
            placeholder="e.g. Itching, redness, flaking, burning sensation, appeared after sun exposure..."></textarea>
        </div>
      </div>

      <button class="analyze-btn" id="analyzeBtn" onclick="analyze()" disabled>
        <span id="btnText">Upload image to continue</span>
      </button>
    </div>

    <!-- RIGHT PANEL: REPORT -->
    <div class="right-panel" id="rightPanel">
      <div class="empty-state">
        <div class="empty-icon">🔬</div>
        <div class="empty-title">No scan analyzed yet</div>
        <div class="empty-text">Upload a skin image and fill in patient details to generate a full dermatological
          assessment using AI.</div>
      </div>
    </div>
  </div>

  <script>
    const NVIDIA_API_KEY = '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';
    let imageBase64 = null;

    // Drag & drop
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => {
        imageBase64 = e.target.result;
        const preview = document.getElementById('preview');
        preview.src = e.target.result;
        preview.style.display = 'block';
        dropZone.classList.add('has-image');
        document.getElementById('analyzeBtn').disabled = false;
        document.getElementById('btnText').textContent = 'Analyze Skin Image →';
      };
      reader.readAsDataURL(file);
    }

    function getSeverityClass(sev) {
      if (!sev) return 'risk-low';
      const s = sev.toLowerCase();
      if (s.includes('high') || s.includes('severe')) return 'risk-high';
      if (s.includes('moderate') || s.includes('medium')) return 'risk-moderate';
      return 'risk-low';
    }

    function showLoading() {
      document.getElementById('rightPanel').innerHTML = `
      <div class="loading-state">
        <div class="skin-anim">🔬</div>
        <div class="loading-title">Analyzing skin image...</div>
        <div class="loading-sub">Multimodal dermatological analysis in progress</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
      </div>`;
    }

    function showError(msg) {
      document.getElementById('rightPanel').innerHTML = `
      <div class="error-box">
        <strong>Analysis failed:</strong> ${msg}<br><br>
        Please try again or check your network connection.
      </div>`;
    }

    function showReport(analysis) {
      const now = new Date();
      const reportId = 'DERM-' + Math.random().toString(36).substr(2, 6).toUpperCase();

      // Determine overall severity
      let maxSeverity = 'low';
      if (analysis.conditions && analysis.conditions.length) {
        analysis.conditions.forEach(c => {
          const s = (c.severity || '').toLowerCase();
          if (s.includes('high') || s.includes('severe')) maxSeverity = 'high';
          else if ((s.includes('moderate') || s.includes('medium')) && maxSeverity !== 'high') maxSeverity = 'moderate';
        });
      }
      const severityClass = `risk-${maxSeverity}`;

      let html = `
      <div class="report">
        <div class="report-header">
          <div>
            <div class="report-id">${reportId}</div>
            <div class="report-title-text">Dermatological Analysis Report</div>
            <div class="report-meta">Generated ${now.toLocaleDateString()} at ${now.toLocaleTimeString()} · NVIDIA Phi-3.5 Vision</div>
          </div>
          <div class="risk-badge ${severityClass}">${maxSeverity.toUpperCase()} SEVERITY</div>
        </div>`;

      // Conditions
      if (analysis.conditions && analysis.conditions.length) {
        html += `<div class="section">
          <div class="section-header"><div class="section-dot" style="background:var(--accent)"></div><div class="section-heading">Primary Findings</div></div>
          <div class="section-body">`;
        analysis.conditions.forEach(c => {
          html += `<p style="margin-bottom:10px"><strong>${c.name || c}</strong>${c.description ? ': ' + c.description : ''}</p>`;
          if (c.severity) html += `<span class="tag">${c.severity.toUpperCase()}${c.confidence ? ' · ' + c.confidence : ''}</span> `;
        });
        html += `</div></div>`;
      }

      // Observations
      if (analysis.observations && analysis.observations.length) {
        html += `<div class="section">
          <div class="section-header"><div class="section-dot" style="background:var(--accent)"></div><div class="section-heading">Key Observations</div></div>
          <div class="section-body"><div class="tag-list">`;
        analysis.observations.forEach(o => { html += `<span class="tag">${o}</span>`; });
        html += `</div></div></div>`;
      }

      // Risk indicators
      if (analysis.risk_indicators && analysis.risk_indicators.length) {
        html += `<div class="section">
          <div class="section-header"><div class="section-dot" style="background:var(--warn)"></div><div class="section-heading">⚠ Risk Indicators</div></div>
          <div class="section-body"><div class="step-list">`;
        analysis.risk_indicators.forEach((r, i) => {
          html += `<div class="step"><div class="step-num">${i + 1}</div><div class="step-text">${r}</div></div>`;
        });
        html += `</div></div></div>`;
      }

      // Recommendations
      if (analysis.recommendations && analysis.recommendations.length) {
        html += `<div class="section">
          <div class="section-header"><div class="section-dot" style="background:var(--success)"></div><div class="section-heading">Recommendations</div></div>
          <div class="section-body"><div class="step-list">`;
        analysis.recommendations.forEach((r, i) => {
          html += `<div class="step"><div class="step-num">${i + 1}</div><div class="step-text">${r}</div></div>`;
        });
        html += `</div></div></div>`;
      }

      // Skin tone notes
      if (analysis.tone_notes) {
        html += `<div class="section">
          <div class="section-header"><div class="section-dot" style="background:var(--accent)"></div><div class="section-heading">Skin Tone Analysis</div></div>
          <div class="section-body">${analysis.tone_notes}</div>
        </div>`;
      }

      html += `
        <div class="disclaimer">
          <strong>⚠ Medical Disclaimer:</strong> This AI analysis is for educational purposes and preliminary assessment only. It is NOT a substitute for professional medical diagnosis. Always consult a licensed dermatologist for accurate diagnosis and treatment.
        </div>
      </div>`;

      document.getElementById('rightPanel').innerHTML = html;
    }

    async function analyze() {
      if (!imageBase64) return;
      showLoading();
      document.getElementById('analyzeBtn').disabled = true;
      document.getElementById('btnText').textContent = 'Analyzing...';

      const patientContext = `
Patient Information:
- Age: ${document.getElementById('age').value || 'Not provided'}
- Sex: ${document.getElementById('sex').value || 'Not provided'}
- Skin Type: ${document.getElementById('skinType').value || 'Not provided'}
- Affected Area: ${document.getElementById('area').value || 'Not provided'}
- Duration: ${document.getElementById('duration').value || 'Not specified'}
- Allergies: ${document.getElementById('allergies').value || 'None reported'}
- Symptoms: ${document.getElementById('symptoms').value || 'None provided'}`;

      try {
        const response = await fetch('http://127.0.0.1:5000/api/analyze/skin', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            image: imageBase64,
            patient: {
              age: document.getElementById('age').value,
              sex: document.getElementById('sex').value,
              skinType: document.getElementById('skinType').value,
              area: document.getElementById('area').value,
              duration: document.getElementById('duration').value,
              allergies: document.getElementById('allergies').value,
              symptoms: document.getElementById('symptoms').value
            }
          })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Backend error');

        showReport(data);
      } catch (error) {
        showError(error.message);
      } finally {
        document.getElementById('analyzeBtn').disabled = false;
        document.getElementById('btnText').textContent = 'Analyze Skin Image →';
      }
    }
  </script>
</body>

</html>
